<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="description" content="简单的抛硬币模拟器，统计正反面次数">
<title>抛硬币</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  display: flex;
  justify-content: center;
  padding: 2rem;
  min-height: 300px;
}
.coin {
  text-align: center;
}
.coin__result {
  font-size: 4rem;
  line-height: 1;
  margin-bottom: 1rem;
  transition: transform 0.3s;
}
.coin__result--flip {
  animation: flip 0.6s ease-in-out;
}
@keyframes flip {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(180deg); }
  100% { transform: rotateY(360deg); }
}
.coin__btn {
  padding: 0.5rem 1.5rem;
  font-size: 1rem;
  border: 1px solid #d4d4d4;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
}
.coin__btn:hover {
  border-color: #d97706;
  color: #d97706;
}
.coin__count {
  margin-top: 1rem;
  font-size: 0.875rem;
  color: #737373;
}
</style>
</head>
<body>
<div class="coin">
  <div class="coin__result" id="result">?</div>
  <button class="coin__btn" onclick="flip()">抛一次</button>
  <div class="coin__count" id="count">正面: 0 | 反面: 0</div>
</div>
<script>
let heads = 0, tails = 0
function flip() {
  const el = document.getElementById('result')
  el.className = 'coin__result coin__result--flip'
  const isHeads = Math.random() < 0.5
  isHeads ? heads++ : tails++
  setTimeout(() => {
    el.textContent = isHeads ? '正面' : '反面'
    el.className = 'coin__result'
    document.getElementById('count').textContent = `正面: ${heads} | 反面: ${tails}`
  }, 300)
}
</script>
</body>
</html>
